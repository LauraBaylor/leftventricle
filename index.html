<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: white;
    }
  </style>
</head>

<body>
  <model-viewer
    src="Left Heart.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    tone-mapping="neutral"

    shadow-intensity="1"
    autoplay
    camera-orbit="-0.7903deg 62.75deg 1.496m"
    field-of-view="15.4deg">
  </model-viewer>
</body>
</html>
